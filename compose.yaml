name: intelligent-report-system

services:
  # 平台控制面数据库：只保存账号、权限、数据源/数据集/指标和治理元数据。
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intelligent_report}
      POSTGRES_USER: ${POSTGRES_USER:-report_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_admin_password}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-report_app}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-local_report_password}
      POSTGRES_WORKER_USER: ${POSTGRES_WORKER_USER:-report_worker}
      POSTGRES_WORKER_PASSWORD: ${POSTGRES_WORKER_PASSWORD:-local_worker_password}
      POSTGRES_CONNECTION_TEST_USER: ${POSTGRES_CONNECTION_TEST_USER:-report_connection_tester}
      POSTGRES_CONNECTION_TEST_PASSWORD: ${POSTGRES_CONNECTION_TEST_PASSWORD:-local_connection_test_password}
      TZ: Asia/Shanghai
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_control_data:/var/lib/postgresql/data
      - ./deployments/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [report_net]

  # 数据仓库数据库：只保存 ODS/DWD/DWS 物理表和稳定发布视图。
  postgres-warehouse:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WAREHOUSE_POSTGRES_DB:-intelligent_report_warehouse}
      POSTGRES_USER: ${WAREHOUSE_POSTGRES_USER:-warehouse_admin}
      POSTGRES_PASSWORD: ${WAREHOUSE_POSTGRES_PASSWORD:-local_warehouse_admin_password}
      WAREHOUSE_READER_USER: ${WAREHOUSE_READER_USER:-report_warehouse_reader}
      WAREHOUSE_READER_PASSWORD: ${WAREHOUSE_READER_PASSWORD:-local_warehouse_reader_password}
      WAREHOUSE_WORKER_USER: ${WAREHOUSE_WORKER_USER:-report_warehouse_worker}
      WAREHOUSE_WORKER_PASSWORD: ${WAREHOUSE_WORKER_PASSWORD:-local_warehouse_worker_password}
      TZ: Asia/Shanghai
    ports:
      - "${WAREHOUSE_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_warehouse_data:/var/lib/postgresql/data
      - ./deployments/postgres-warehouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [report_net]

  # 为后续查询缓存和任务调度预留的持久化 Redis。
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:-local_redis_password}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-local_redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 3s
    networks: [report_net]

  # 保存上传文件、报告产物和元数据快照的 S3 兼容存储。
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-report_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-local_minio_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks: [report_net]

  # 一次性、幂等创建应用所需对象桶。
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-report_minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-local_minio_password}
      MINIO_BUCKET_REPORTS: ${MINIO_BUCKET_REPORTS:-reports}
      MINIO_BUCKET_UPLOADS: ${MINIO_BUCKET_UPLOADS:-uploads}
      MINIO_BUCKET_SNAPSHOTS: ${MINIO_BUCKET_SNAPSHOTS:-snapshots}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET_REPORTS}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET_UPLOADS}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET_SNAPSHOTS}"
    restart: "no"
    networks: [report_net]

  # 隔离数据库驱动与外部查询执行的 Python 服务。
  connector-service:
    build:
      context: ./connector_service
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      CONNECTOR_INTERNAL_TOKEN: ${CONNECTOR_INTERNAL_TOKEN:-local_connector_token_change_me}
      CONNECTOR_CONNECTION_TEST_TOKEN: ${CONNECTOR_CONNECTION_TEST_TOKEN:-local_connector_connection_test_token_change_me}
      CONNECTOR_MAX_CONNECTIONS_PER_SOURCE: ${CONNECTOR_MAX_CONNECTIONS_PER_SOURCE:-5}
      CONNECTOR_MAX_CONCURRENT_QUERIES: ${CONNECTOR_MAX_CONCURRENT_QUERIES:-10}
      # 生产环境必须显式注入，使用 ${VAR-} 保留空值并让 Connector 失败关闭。
      CONNECTOR_MAX_POOLS: ${CONNECTOR_MAX_POOLS-}
      CONNECTOR_MAX_TOTAL_CONNECTIONS: ${CONNECTOR_MAX_TOTAL_CONNECTIONS-}
      CONNECTOR_POOL_IDLE_TTL_SECONDS: ${CONNECTOR_POOL_IDLE_TTL_SECONDS:-300}
      CONNECTOR_HTTP_MAX_REQUEST_BYTES: ${CONNECTOR_HTTP_MAX_REQUEST_BYTES-}
      CONNECTOR_JSON_MAX_RESPONSE_BYTES: ${CONNECTOR_JSON_MAX_RESPONSE_BYTES-}
      CONNECTOR_METADATA_SYNC_MAX_ROWS: ${CONNECTOR_METADATA_SYNC_MAX_ROWS-}
      CONNECTOR_METADATA_SAMPLE_MAX_CELL_BYTES: ${CONNECTOR_METADATA_SAMPLE_MAX_CELL_BYTES-}
      CONNECTOR_METADATA_SAMPLE_MAX_ROW_BYTES: ${CONNECTOR_METADATA_SAMPLE_MAX_ROW_BYTES-}
      CONNECTOR_METADATA_SAMPLE_MAX_RESPONSE_BYTES: ${CONNECTOR_METADATA_SAMPLE_MAX_RESPONSE_BYTES-}
      CONNECTOR_STREAM_MAX_CELL_BYTES: ${CONNECTOR_STREAM_MAX_CELL_BYTES-}
      CONNECTOR_STREAM_MAX_ROW_BYTES: ${CONNECTOR_STREAM_MAX_ROW_BYTES-}
      CONNECTOR_STREAM_MAX_BYTES: ${CONNECTOR_STREAM_MAX_BYTES-}
      # 开发网络按服务名授权。production 启动会拒绝 hostname 规则，必须改为
      # IP/CIDR:port，并另行提供平台控制面 CIDR denylist。
      CONNECTOR_EGRESS_ALLOWLIST: ${CONNECTOR_EGRESS_ALLOWLIST-}
      CONNECTOR_EGRESS_DENYLIST: ${CONNECTOR_EGRESS_DENYLIST-}
    ports:
      - "127.0.0.1:${CONNECTOR_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health/live', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [report_net]

volumes:
  postgres_control_data:
  postgres_warehouse_data:
  redis_data:
  minio_data:

networks:
  report_net:
    driver: bridge
